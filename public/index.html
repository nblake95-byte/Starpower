<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ Star Power!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sun: #FFD600;
    --grass: #66BB6A;
    --pink: #FF6B9D;
    --purple: #9C6FE4;
    --card-bg: rgba(255,255,255,0.92);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(180deg, #87CEEB 0%, #B2EBF2 40%, #A5D6A7 100%);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  .cloud {
    position: fixed;
    background: white;
    border-radius: 50px;
    opacity: 0.85;
    pointer-events: none;
    z-index: 0;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud-1 { width: 120px; height: 40px; top: 8%; left: -130px; animation: floatCloud 18s linear infinite; }
  .cloud-1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
  .cloud-1::after { width: 45px; height: 45px; top: -20px; left: 50px; }
  .cloud-2 { width: 90px; height: 30px; top: 20%; left: -100px; animation: floatCloud 24s linear infinite 6s; }
  .cloud-2::before { width: 50px; height: 50px; top: -25px; left: 10px; }
  .cloud-2::after { width: 35px; height: 35px; top: -15px; left: 40px; }
  .cloud-3 { width: 150px; height: 45px; top: 5%; left: -160px; animation: floatCloud 20s linear infinite 12s; }
  .cloud-3::before { width: 70px; height: 70px; top: -35px; left: 20px; }
  .cloud-3::after { width: 55px; height: 55px; top: -25px; left: 65px; }
  @keyframes floatCloud {
    from { left: -200px; }
    to { left: 110vw; }
  }
  .sun {
    position: fixed;
    top: 20px; right: 30px;
    width: 80px; height: 80px;
    background: var(--sun);
    border-radius: 50%;
    box-shadow: 0 0 0 12px rgba(255,214,0,0.25), 0 0 0 24px rgba(255,214,0,0.12);
    animation: sunPulse 3s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes sunPulse {
    0%, 100% { box-shadow: 0 0 0 12px rgba(255,214,0,0.25), 0 0 0 24px rgba(255,214,0,0.12); }
    50% { box-shadow: 0 0 0 18px rgba(255,214,0,0.3), 0 0 0 36px rgba(255,214,0,0.15); }
  }
  .star-float {
    position: fixed;
    font-size: 1.4rem;
    pointer-events: none;
    z-index: 0;
    animation: starDrift linear infinite;
    opacity: 0;
  }
  @keyframes starDrift {
    0% { opacity: 0; transform: translateY(0) rotate(0deg); }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-100vh) rotate(360deg); }
  }
  .sync-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--grass);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease, opacity 0.5s ease;
    z-index: 999;
    opacity: 0;
  }
  .sync-bar.saving { transform: scaleX(0.7); opacity: 1; }
  .sync-bar.saved { transform: scaleX(1); opacity: 0; transition: transform 0.2s ease, opacity 0.8s ease 0.3s; }
  .sync-bar.error { background: #FF6B6B; transform: scaleX(1); opacity: 1; }
  .sync-status {
    position: fixed;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.55);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 0.8rem;
    padding: 4px 14px;
    border-radius: 20px;
    z-index: 998;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .sync-status.show { opacity: 1; }
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  header { text-align: center; margin-bottom: 28px; }

    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.2rem, 6vw, 3.4rem);
